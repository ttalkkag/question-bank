<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문제은행</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="header">
      <h1>모의고사 문제은행</h1>
      <div class="header-actions">
        <input id="catalog-url" type="url" placeholder="외부 catalog.json URL (선택)" />
        <button id="load-catalog-url">외부 목록 불러오기</button>
        <label class="file-input-label">
          로컬 JSON 불러오기
          <input id="local-json-input" type="file" accept="application/json" />
        </label>
      </div>
    </header>

    <main class="container">
      <section id="home-section" class="card">
        <h2>문제은행 목록</h2>
        <p id="home-error" class="error" hidden></p>
        <div id="bank-list" class="list"></div>
        <h3>최근 진행 기록</h3>
        <div id="recent-progress"></div>
      </section>

      <section id="bank-section" class="card" hidden>
        <div class="section-header">
          <h2 id="bank-title"></h2>
          <button id="back-home">홈으로</button>
        </div>
        <p id="bank-description"></p>
        <div class="layout">
          <aside class="filters">
            <h3>필터</h3>
            <label>과목 <select id="filter-subject"></select></label>
            <label>단원 <select id="filter-unit"></select></label>
            <label>태그 <select id="filter-tag"></select></label>
            <label>유형 <select id="filter-type"></select></label>
            <label>난이도 <select id="filter-difficulty"></select></label>
            <button id="reset-filters">필터 초기화</button>
          </aside>
          <div class="bank-actions">
            <p id="filtered-count"></p>
            <button id="start-random">랜덤 시작</button>
            <button id="start-all">전체 시작</button>
            <button id="start-wrong-only">오답만 다시 풀기</button>
          </div>
        </div>
      </section>

      <section id="quiz-section" class="card" hidden>
        <div class="section-header">
          <h2>문제 풀이</h2>
          <button id="quit-quiz">종료</button>
        </div>
        <p id="quiz-progress"></p>
        <p id="quiz-meta"></p>
        <h3 id="question-stem"></h3>
        <div id="question-input"></div>
        <button id="grade-btn">정답 확인</button>
        <div id="grade-result"></div>
        <p id="explanation"></p>
        <div class="nav-buttons">
          <button id="prev-question">이전</button>
          <button id="next-question">다음</button>
          <button id="finish-quiz">결과 보기</button>
        </div>
      </section>

      <section id="result-section" class="card" hidden>
        <div class="section-header">
          <h2>결과 요약</h2>
          <button id="result-home">홈으로</button>
        </div>
        <div id="result-summary"></div>
        <h3>틀린 문제</h3>
        <ul id="wrong-list"></ul>
        <button id="retry-wrong">틀린 문제 다시 풀기</button>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
